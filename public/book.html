<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#0b1120;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:80px 20px;
}

.hero{
display:flex;
align-items:center;
justify-content:center;
gap:70px;
flex-wrap:wrap;
}

.book{
width:320px;
border-radius:15px;
box-shadow:0 30px 60px rgba(0,0,0,.5);
}

.content{
max-width:550px;
}

.badge{
display:inline-block;
padding:8px 16px;
background:#1d4ed8;
border-radius:30px;
font-size:14px;
margin-bottom:20px;
}

h1{
font-size:52px;
margin-bottom:15px;
line-height:1.1;
}

.subtitle{
font-size:22px;
color:#94a3b8;
margin-bottom:30px;
}

p{
line-height:1.8;
color:#cbd5e1;
margin-bottom:35px;
}

.btn{
display:inline-block;
padding:18px 42px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
font-size:18px;
font-weight:700;
transition:.3s;
}

.btn:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
margin-top:100px;
}

.card{
background:#111827;
padding:30px;
border-radius:12px;
}

.card h3{
margin-bottom:10px;
}

footer{
text-align:center;
padding:50px;
color:#94a3b8;
}

@media(max-width:768px){

h1{
font-size:38px;
}

.hero{
text-align:center;
}

}

</style>
